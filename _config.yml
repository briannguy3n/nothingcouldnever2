# Site Build Settings

# jekyll-paginate configuration
paginate:            5

# Build settings
markdown:            kramdown
highlighter:         rouge
permalink:           /:title
plugins:             [jekyll-paginate, jekyll-sitemap, jekyll-feed, jekyll-seo-tag]

# Customise atom feed settings (this is where Jekyll-Feed gets configuration information)
title:		           "nothingcouldnever"

# Site URL configuration
url:                "https://www.nothingcouldnever.com"
baseurl:            ""

# RSS 2.0 can be used instead of Atom by uncommenting following two lines
#feed:
#  path: rss-feed.xml

# Keep Jekyll away from developer tooling and Ruby/Node artifacts
exclude:
  - tools
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md

# Notes collection: one .md per share token → /notes/<token>/
collections:
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: notes
    values:
      layout: note-share
      sitemap: false
      title: Notes
      permalink: /notes/:path/
