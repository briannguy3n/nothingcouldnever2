---
layout: no-header
---

{% if page.protected %}
<script>
  (function() {
    if (sessionStorage.getItem('notesAuthenticated') !== 'true') {
      sessionStorage.setItem('notesRedirectAfterAuth', window.location.pathname);
      window.location.href = '/notes-password';
    }
  })();
</script>
{% endif %}

<div class="notes-share-outer">
  <div class="notes-share-view">
    <img src="{{ site.baseurl }}/assets/notes/images/{{ page.filename }}"
         alt="{{ page.caption | default: '' }}"
         class="notes-share-image">
    <div class="notes-share-date">{{ page.date | date: "%B %-d, %Y" }}</div>
  </div>
</div>
